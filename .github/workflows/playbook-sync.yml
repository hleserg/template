name: PLAYBOOK sync

on:
  schedule:
    - cron: "0 7 * * 5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: Extract PLAYBOOK markers
        run: uv run python scripts/extract_playbook.py --output playbook.json
      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: playbook-digest
          path: playbook.json
      # TODO: push markers to hleserg/agent-playbook (needs a PAT secret).
